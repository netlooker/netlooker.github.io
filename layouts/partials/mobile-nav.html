{{ $isHome  := .IsHome }}
{{ $section := .Section }}
{{ $slug    := "" }}
{{ with .File }}{{ $slug = .BaseFileName }}{{ end }}

<nav class="mobile-nav">
  <a href="{{ "/" | absURL }}"        class="{{ if $isHome            }}is-active{{ end }}">
    <span class="material-symbols-outlined">home</span>
    <span class="mobile-nav-label">HOME</span>
  </a>
  <a href="{{ "/posts" | absURL }}"   class="{{ if eq $section "posts"}}is-active{{ end }}">
    <span class="material-symbols-outlined">folder_open</span>
    <span class="mobile-nav-label">POSTS</span>
  </a>
  <a href="{{ "/tags"       | absURL }}"   class="{{ if eq $section "tags"       }}is-active{{ end }}">
    <span class="material-symbols-outlined">label</span>
    <span class="mobile-nav-label">TAGS</span>
  </a>
  <a href="{{ "/chronicles" | absURL }}"   class="{{ if eq $section "chronicles" }}is-active{{ end }}">
    <span class="material-symbols-outlined">auto_stories</span>
    <span class="mobile-nav-label">CHRONICLES</span>
  </a>
  <a href="{{ "/about"      | absURL }}"   class="{{ if eq $slug "about"         }}is-active{{ end }}">
    <span class="material-symbols-outlined">memory</span>
    <span class="mobile-nav-label">ABOUT</span>
  </a>
</nav>
